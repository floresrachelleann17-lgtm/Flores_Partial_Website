<div class="tips-page">
  <div class="context-container">
    <div class="context-box">
      <h1>Discover the Best Travel Tips</h1>
      <p>Prepare for your Palawan journey with expert advice on everything from local currency to eco-etiquette. These are the top tips every traveler should know before visiting the Last Frontier.</p>
    </div>
  </div>

  <div class="tips-grid">
    <div class="tip-card" *ngFor="let tip of tips">
      <div class="card-glass">
        <i [class]="tip.icon"></i>
        <h3>{{ tip.title }}</h3>
        <p>{{ tip.description }}</p>
      </div>
    </div>
  </div>
</div>
